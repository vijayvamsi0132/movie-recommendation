<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #141414;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #e50914;
        }
        select, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }
        .movies {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            width: 180px;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }
        .card img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Movie Recommendation System</h1>

    <form method="POST">
        <select name="movie">
            {% for movie in movie_titles %}
                <option value="{{ movie }}" {% if movie == selected_movie %}selected{% endif %}>
                    {{ movie }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Recommend</button>
    </form>

    <div class="movies">
        {% for movie in recommendations %}
        <div class="card">
            <img src="{{ movie.poster }}" alt="{{ movie.title }}">
            <p>{{ movie.title }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
